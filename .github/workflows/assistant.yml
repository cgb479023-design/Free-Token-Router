name: 24-7 AI Assistant
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  run-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Assistant Cycle
        env:
          OPEN_ROUTER: ${{ secrets.OPEN_ROUTER }}
        run: python assistant_core.py

      - name: Save Memory State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add assistant_memory.db data.json
          git commit -m "chore: update assistant pulse [skip ci]" || echo "No changes to commit"
          git push
